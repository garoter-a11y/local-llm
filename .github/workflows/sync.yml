name: Sync Fork
on:
  schedule:
    - cron: '0 2 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Sync upstream
        run: |
          git remote add upstream https://github.com/jamesob/local-llm.git
          git fetch upstream
          git checkout main
          git merge upstream/main --no-edit || echo "Merge conflict, manual review needed"
          git push origin main
